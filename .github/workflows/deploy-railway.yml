name: Deploy Backend → Railway

on:
  push:
    branches:
      - main                   # despliega a producción al hacer push a main
    paths:
      - "backend/**"           # solo si hay cambios en el backend
      - ".github/workflows/deploy-railway.yml"
  workflow_dispatch:           # permite disparar manualmente desde GitHub

jobs:
  # ── Job 1: validar imports antes de desplegar ───────────────────────────
  lint-and-test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        run: pip install -r backend/requirements.txt

      - name: Verificar imports del backend
        # Simula el entorno de producción: backend/ como paquete bajo /app
        run: |
          mkdir -p /tmp/apptest
          cp -r backend /tmp/apptest/backend
          cd /tmp/apptest
          python -c "
          import sys; sys.path.insert(0, '.')
          from backend.config import HUB_API_KEY
          from backend.model import classify, predict_annotated
          from backend.routes.detect import router
          print('✓ Todos los imports del backend son correctos')
          "
        env:
          HUB_API_KEY:    "test"
          HUB_MODEL_URL:  "https://example.com"
          HUB_DETECT_URL: "https://example.com"

  # ── Job 2: despliegue a Railway ─────────────────────────────────────────
  deploy:
    name: Deploy → Railway
    runs-on: ubuntu-latest
    needs: lint-and-test

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy a Railway
        # Railway usa el Dockerfile de backend/ automáticamente.
        # RAILWAY_TOKEN: Settings → Tokens en railway.app
        # RAILWAY_SERVICE_ID: URL del servicio en railway.app (Settings → Service ID)
        run: |
          railway up \
            --service ${{ secrets.RAILWAY_SERVICE_ID }} \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        working-directory: backend
