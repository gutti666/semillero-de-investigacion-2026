name: Deploy to Vercel

on:
  push:
    branches:
      - main          # despliega a producción al hacer push a main
  pull_request:
    branches:
      - main          # despliega preview en cada PR abierto contra main
  workflow_dispatch:  # permite disparar el workflow manualmente desde GitHub

jobs:
  # ── Job 1: tests mínimos antes de desplegar ─────────────────────────────
  lint-and-test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        run: pip install -r backend/requirements.txt

      - name: Verificar imports del backend
        run: python -c "from backend.config import HUB_API_KEY; print('imports OK')"
        env:
          HUB_API_KEY:    "test"
          HUB_MODEL_URL:  "https://example.com"
          HUB_DETECT_URL: "https://example.com"

  # ── Job 2: despliegue a Vercel ──────────────────────────────────────────
  deploy:
    name: Deploy → Vercel
    runs-on: ubuntu-latest
    needs: lint-and-test   # solo despliega si el job anterior pasa

    # Permisos mínimos necesarios
    permissions:
      contents: read         # para hacer checkout
      deployments: write     # para crear registros de deployment en GitHub

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy a Vercel (Producción)
        uses: amondnet/vercel-action@v25
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: .

      - name: Deploy a Vercel (Preview — Pull Request)
        uses: amondnet/vercel-action@v25
        if: github.event_name == 'pull_request'
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: .
